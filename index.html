<!DOCTYPE html>
<html>
<head>
  <title>Trollpicks</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    .header {
      background: #0b1f3a;
      color: white;
      padding: 35px;
      text-align: center;
      font-size: 70px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      position: relative;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 8px solid transparent;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    .content {
      padding: 12px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .note {
      margin-top: 5px;
      color: #555;
    }

    .index {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 10px;
      font-size: 18px;
      border-radius: 8px;
    }

    .music-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      background: #ff2f92;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-badge img {
      width: 22px;
      height: 22px;
    }

  </style>
</head>

<body>

<div class="header">TROLLPICKS</div>

<div class="grid" id="grid"></div>

<script>

const trollpicks = [
  { name:"Ajaxvlad", note:8 },
  { name:"Mozzarellia", note:9 },
  { name:"Yasugrosyonegro", note:7 },
  { name:"Jeanluxmelanchon", note:8 }
];

const grid = document.getElementById("grid");

function checkMusic(name, callback){
  const audio = new Audio();
  audio.src = name + ".mp3";

  audio.onloadedmetadata = () => callback(true);
  audio.onerror = () => callback(false);
}

function render(){

  grid.innerHTML="";

  trollpicks.forEach(t=>{

    const indexOriginal = trollpicks.indexOf(t)+1;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="index">#${indexOriginal}</div>
      <img src="${t.name}.png">
      <div class="content">
        <div class="title">${t.name}</div>
        <div class="note">⭐ ${t.note}/10</div>
      </div>
    `;

    // 👉 CHECK AUTO MUSIQUE
    checkMusic(t.name, (hasMusic)=>{
      if(hasMusic){
        const badge = document.createElement("div");
        badge.className = "music-badge";
        badge.innerHTML = `<img src="note.png">`;
        card.appendChild(badge);
      }
    });

    grid.appendChild(card);
  });
}

render();

</script>

</body>
</html>
