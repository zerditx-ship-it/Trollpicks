<!DOCTYPE html>
<html>
<head>
  <title>Trollpicks</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    .logo {
  height: 80px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

    .header {
  background: #0b1f3a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}
  
    .header img {
      display: block;
    }

    .controls-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  margin-bottom: 5px;
}

    button {
      padding: 10px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      position: relative;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 8px solid transparent;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    .content {
      padding: 12px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .btn-img-ui {
  height: 40px;
  cursor: pointer;
  transition: transform 0.2s;
}

.btn-img-ui:hover {
  transform: scale(1.2);
}

    .note {
      margin-top: 5px;
      color: #555;
    }

    /* NUMERO */
    .index {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 10px;
      font-size: 18px;
      border-radius: 8px;
    }

    /* BADGE MUSIQUE */
    .music-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      background: #ff2f92; /* rose/magenta */
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-badge img {
      width: 22px;
      height: 22px;
    }

    .active {
      filter: brightness(1.3);
    }

    /* MODAL */
    .modal {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.8);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:white;
      width:75%;
      max-height:90%;
      border-radius:12px;
      display:flex;
      overflow:hidden;
    }

    .label {
      color: white;
  font-weight: bold;
  font-size: 18px;
}

    .left {
      width:40%;
    }

    .left-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sort-buttons {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.right-controls {
  display: flex;
  align-items: center;
}

    .random-btn {
  height: 90px;
}


    .left img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .right {
      width:60%;
      padding:25px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .modal-title {
      font-size:36px;
      font-weight:bold;
      text-align:center;
      margin-bottom:10px;
    }

    .info {
      flex:1;
      display:flex;
      align-items:center;
    }

    .desc {
      font-size:18px;
      color:#333;
      text-align:left;
      width:100%;
    }

    /* PLAYER */
    .player {
      background:#111;
      color:white;
      padding:15px;
      border-radius:10px;
    }

    .player-title {
      font-size:22px;
      margin-bottom:10px;
    }

    .player-controls {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .progress {
      flex:1;
    }

    .volume {
      height:60px;
      writing-mode: bt-lr;
      -webkit-appearance: slider-vertical;
    }

    .btn-img {
      width:40px;
      cursor:pointer;
    }

    .time {
      font-size:14px;
      width:50px;
      text-align:center;
    }

  </style>
</head>

<body>

<div class="header">

  <div class="left-controls">
    <span class="label">Trier par :</span>

    <div class="sort-buttons">
      <img src="noteboutton1.png" class="btn-img-ui" onclick="sortBy('note')">
      <img src="numero1.png" class="btn-img-ui" onclick="sortBy('index')">
    </div>
  </div>

  <img src="trollpick.png" class="logo">

  <div class="right-controls">
    <img src="aleatoire.png" class="btn-img-ui random-btn" onclick="randomPick()">
  </div>

</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">

    <div class="left">
      <img id="modalImg">
    </div>

    <div class="right">

      <div class="modal-title" id="modalTitle"></div>

      <div class="info">
        <div class="desc" id="modalDesc"></div>
      </div>

      <div class="player">
        <div class="player-title" id="playerTitle"></div>

        <div class="player-controls">
          <img src="pauseplay2.png" class="btn-img" onclick="togglePlay()">

          <div class="time" id="currentTime">0:00</div>

          <input type="range" id="progress" class="progress">

          <div class="time" id="duration">0:00</div>

          <input type="range" id="volume" class="volume" min="0" max="1" step="0.01">
        </div>
      </div>

    </div>

  </div>
</div>

<audio id="audio"></audio>

<script>

let mode = "index";

const trollpicks = [
  { name:"Ajaxvlad", note:8, desc:"Description Ajax", music:true },
  { name:"Mozzarellia", note:9, desc:"Description Mozza", music:false },
  { name:"Yasugrosyonegro", note:7, desc:"Description Yasu", music:true },
  { name:"Jeanluxmelanchon", note:8, desc:"Description Jeanlux", music:true },
  { name:"Cho Kogbucha", note:6, desc:"Description Cho", music:true },
  { name:"Roure-AtZed & Cho'pinot", note:5, desc:"Description Roure-Atzed", music:true },
  { name:"Liliane et José", note:9, desc:"Description liliane", music:false },
  { name:"Pizzac Raviolee", note:9, desc:"Description pizzac", music:false },
  { name:"Throushcrank", note:10, desc:"Description throush", music:false },
  { name:"Viagralistar", note:8, desc:"Description viagra", music:false }
];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");

audio.volume = 0.1;

function render(){

  grid.innerHTML="";

  let data = [...trollpicks];
  if(mode==="note") data.sort((a,b)=>b.note-a.note);

  const sorted = [...trollpicks].sort((a,b)=>b.note-a.note);
  const top1 = sorted[0].note;
  const top2 = sorted.find(x=>x.note<top1)?.note;
  const top3 = sorted.find(x=>x.note<top2)?.note;

  data.forEach(t=>{
    let border="transparent";
    if(t.note===top1) border="gold";
    else if(t.note===top2) border="#9a9a9a";
    else if(t.note===top3) border="#cd7f32";

    const indexOriginal = trollpicks.indexOf(t)+1;

    const card=document.createElement("div");
    card.className="card";
    card.style.borderColor=border;

    card.innerHTML=`
      <div class="index">#${indexOriginal}</div>

      ${t.music ? `
        <div class="music-badge">
          <img src="note.png">
        </div>
      ` : ""}

      <img src="${t.name}.png" onerror="this.src='cooking.png'">

      <div class="content">
        <div class="title">${t.name}</div>
        <div class="note">⭐ ${t.note}/10</div>
      </div>
    `;

    card.onclick=()=>openModal(t);

    grid.appendChild(card);
  });
}

function sortBy(type){
  mode = type;
  render();
}

function randomPick(){

  let minNote = prompt("Note minimale ? (0 à 10)");

  if(minNote === null) return; // si annule

  minNote = parseFloat(minNote);

  if(isNaN(minNote)) {
    alert("Entre un nombre valide");
    return;
  }

  // filtre
  const valid = trollpicks.filter(t => t.note >= minNote);

  if(valid.length === 0){
    alert("Aucun trollpick avec cette note");
    return;
  }

  // choix aléatoire
  const random = valid[Math.floor(Math.random() * valid.length)];

  // ouverture
  openModal(random);
}  

function openModal(t){
  document.getElementById("modal").style.display="flex";

  document.getElementById("modalImg").src = t.name + ".png";
document.getElementById("modalImg").onerror = function(){
  this.src = "cooking.png";
};
  document.getElementById("modalTitle").textContent = t.name;
  document.getElementById("modalDesc").textContent = t.desc;
  document.getElementById("playerTitle").textContent = t.name;

  audio.src = t.name + ".mp3";
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

const progress = document.getElementById("progress");
const currentTime = document.getElementById("currentTime");
const duration = document.getElementById("duration");

audio.addEventListener("timeupdate", ()=>{
  progress.value = (audio.currentTime/audio.duration)*100 || 0;
  currentTime.textContent = format(audio.currentTime);
  duration.textContent = format(audio.duration);
});

progress.addEventListener("input", ()=>{
  audio.currentTime = (progress.value/100)*audio.duration;
});

document.getElementById("volume").addEventListener("input", (e)=>{
  audio.volume = e.target.value;
});

function format(t){
  if(isNaN(t)) return "0:00";
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  if(s<10) s="0"+s;
  return m+":"+s;
}

document.getElementById("modal").onclick = (e)=>{
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
    audio.pause();
  }
};

render();

</script>

</body>
</html>
