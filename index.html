<!DOCTYPE html>
<html>
<head>
  <title>Trollpicks</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    /* HEADER */
    .header {
      background: #0b1f3a;
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 40px;
      font-weight: bold;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      position: relative;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
      border: 6px solid transparent; /* PLUS LARGE */
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3; /* FORCE MEME FORMAT */
      object-fit: cover;
    }

    .content {
      padding: 10px;
      text-align: center;
      min-height: 80px; /* FORCE MEME HAUTEUR */
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .title {
      font-weight: bold;
    }

    .note {
      color: #444;
      margin-top: 5px;
    }

    .index {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
    }

    /* PLAYER */
    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      color: white;
      padding: 10px 15px; /* MOINS HAUT */
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .song-title {
      font-weight: bold;
      text-align: center;
      font-size: 18px; /* PLUS GROS */
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress {
      flex: 1;
    }

    /* volume à droite */
    .volume-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input[type="range"].vertical {
      writing-mode: bt-lr;
      -webkit-appearance: slider-vertical;
      height: 60px;
    }
  </style>
</head>

<body>

<div class="header">Trollpicks</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="song-title" id="songTitle">---</div>

  <div class="controls">
    <button onclick="togglePlay()">⏯</button>
    <input type="range" id="progress" class="progress" value="0">

    <div class="volume-container">
      <input type="range" id="volume" class="vertical" min="0" max="1" step="0.01" value="1">
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
const trollpicks = [
  { name: "Ajaxvlad", note: 8 },
  { name: "Mozzarellia", note: 9 },
  { name: "Yasugrosyonegro", note: 7 },
  { name: "Jeanluxmelanchon", note: 8 }
];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const player = document.getElementById("player");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const songTitle = document.getElementById("songTitle");

// classement
const sorted = [...trollpicks].sort((a,b)=>b.note-a.note);
const top1 = sorted[0].note;
const top2 = sorted.find(x => x.note < top1)?.note;
const top3 = sorted.find(x => x.note < top2)?.note;

trollpicks.forEach((t, i) => {

  let border = "transparent";

  if (t.note === top1) border = "gold";
  else if (t.note === top2) border = "silver";
  else if (t.note === top3) border = "#cd7f32";

  const card = document.createElement("div");
  card.className = "card";
  card.style.borderColor = border;

  card.innerHTML = `
    <div class="index">#${i+1}</div>
    <img src="${t.name}.png">
    <div class="content">
      <div class="title">${t.name}</div>
      <div class="note">⭐ ${t.note}/10</div>
    </div>
  `;

  card.onclick = () => playMusic(t.name);

  grid.appendChild(card);
});

function playMusic(name) {
  audio.src = name + ".mp3";
  audio.play();
  songTitle.textContent = name;
  player.style.display = "flex";
}

function togglePlay() {
  if (audio.paused) audio.play();
  else audio.pause();
}

audio.addEventListener("timeupdate", () => {
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
});

progress.addEventListener("input", () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
});

volume.addEventListener("input", () => {
  audio.volume = volume.value;
});
</script>

</body>
</html>
