<!DOCTYPE html>
<html>
<head>
  <title>Trollpick</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.08);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      margin-top: 10px;
      font-weight: bold;
    }

    audio {
      display: none;
    }

    /* PLAYER */
    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #181818;
      padding: 12px;
      display: none;
      flex-direction: column;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
    }

    .time {
      font-size: 0.9em;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>🎬 Trollpick Auto System 🎬</h1>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="controls">
    <button onclick="togglePlay()">⏯</button>
    <input type="range" id="progress" value="0">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
  <div class="time" id="time">0:00 / 0:00</div>
</div>

<audio id="audio"></audio>

<script>
  // 👉 ICI TU AJOUTES JUSTE LES NOMS
  const trollpicks = [
    "Ajaxvlad",
    "Mozzarellia",
    "Yasugrosyonegro"
    "Jeanluxmelanchon"
  ];

  const grid = document.getElementById("grid");
  const audio = document.getElementById("audio");
  const player = document.getElementById("player");
  const progress = document.getElementById("progress");
  const volume = document.getElementById("volume");
  const timeDisplay = document.getElementById("time");

  // GENERATION AUTOMATIQUE DU SITE
  trollpicks.forEach(name => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${name}.png">
      <div class="title">${name}</div>
    `;

    card.onclick = () => playMusic(name + ".mp3");

    grid.appendChild(card);
  });

  function playMusic(src) {
    audio.src = src;
    audio.play();
    player.style.display = "flex";
  }

  function togglePlay() {
    if (audio.paused) audio.play();
    else audio.pause();
  }

  audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100 || 0;

    let current = format(audio.currentTime);
    let duration = format(audio.duration);
    timeDisplay.textContent = current + " / " + duration;
  });

  progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
  });

  volume.addEventListener("input", () => {
    audio.volume = volume.value;
  });

  function format(t) {
    if (isNaN(t)) return "0:00";
    let m = Math.floor(t / 60);
    let s = Math.floor(t % 60);
    if (s < 10) s = "0" + s;
    return m + ":" + s;
  }
</script>

</body>
</html>
