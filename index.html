<!DOCTYPE html>
<html>
<head>
  <title>Trollpick Universe</title>

  <style>
    body {
      background: linear-gradient(to bottom, #0f0f0f, #1a1a1a);
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      text-align: center;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .card img {
      width: 100%;
      border-radius: 12px;
    }

    .title {
      margin-top: 12px;
      font-weight: bold;
    }

    /* PLAYER */

    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #181818;
      padding: 15px;
      display: none;
      flex-direction: column;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      background: none;
      border: 1px solid white;
      color: white;
      padding: 5px 10px;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
    }

    .time {
      font-size: 0.9em;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>🎬 Trollpick Universe 🎬</h1>

<div class="grid">

  <div class="card" onclick="playMusic('Ajaxvlad.mp3')">
    <img src="Ajaxvlad.png">
    <div class="title">Ajaxvlad</div>
  </div>

  <div class="card" onclick="playMusic('Mozzarrellia.mp3')">
    <img src="Mozzarellia.png">
    <div class="title">Mozzarellia</div>
  </div>

  <div class="card" onclick="playMusic('Yasugrosyonegro.mp3')">
    <img src="Yasugrosyonegro.png">
    <div class="title">Yasugrosyonegro</div>
  </div>

</div>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="controls">
    <button onclick="togglePlay()">⏯</button>
    <input type="range" id="progress" value="0">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
  <div class="time" id="time">0:00 / 0:00</div>
</div>

<audio id="audio"></audio>

<script>
  let audio = document.getElementById("audio");
  let player = document.getElementById("player");
  let progress = document.getElementById("progress");
  let volume = document.getElementById("volume");
  let timeDisplay = document.getElementById("time");

  function playMusic(src) {
    audio.src = src;
    audio.play();
    player.style.display = "flex";
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  }

  // progression
  audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100 || 0;

    let current = formatTime(audio.currentTime);
    let duration = formatTime(audio.duration);
    timeDisplay.textContent = current + " / " + duration;
  });

  progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
  });

  // volume
  volume.addEventListener("input", () => {
    audio.volume = volume.value;
  });

  function formatTime(time) {
    if (isNaN(time)) return "0:00";
    let minutes = Math.floor(time / 60);
    let seconds = Math.floor(time % 60);
    if (seconds < 10) seconds = "0" + seconds;
    return minutes + ":" + seconds;
  }
</script>

</body>
</html>
