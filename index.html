<!DOCTYPE html>
<html>
<head>
  <title>Trollpicks</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    /* HEADER */
    .header {
      background: #0b1f3a;
      color: white;
      padding: 35px;
      text-align: center;
      font-size: 60px; /* PLUS GROS */
      font-weight: bold;
      letter-spacing: 3px;
    }

    /* TRI BUTTON */
    .controls-bar {
      text-align: center;
      margin: 15px;
    }

    button.sort-btn {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      position: relative;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 8px solid transparent; /* PLUS EPAIS */
      display: flex;
      flex-direction: column;
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    .content {
      padding: 12px;
      text-align: center;
    }

    .title {
      font-size: 20px; /* PLUS GROS */
      font-weight: bold;
    }

    .note {
      margin-top: 5px;
    }

    .index {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 10px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
    }

    /* POPUP */
    .modal {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.8);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:white;
      padding:20px;
      border-radius:12px;
      width:500px;
      max-width:90%;
      text-align:center;
    }

    .modal img {
      width:100%;
      border-radius:10px;
    }

    .desc {
      margin:10px 0;
      color:#333;
    }

    /* PLAYER */
    .player {
      background:#111;
      color:white;
      padding:15px;
      margin-top:10px;
      border-radius:10px;
    }

    .player-top {
      font-size:22px;
      margin-bottom:10px;
    }

    .player-controls {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .big-btn {
      font-size:22px;
      padding:10px;
      cursor:pointer;
    }

    .progress {
      flex:1;
    }

    .time {
      font-size:14px;
      width:60px;
      text-align:center;
    }

  </style>
</head>

<body>

<div class="header">TROLLPICKS</div>

<div class="controls-bar">
  <button class="sort-btn" onclick="sortBy('note')">Trier par note</button>
  <button class="sort-btn" onclick="sortBy('index')">Ordre original</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <img id="modalImg">
    <h2 id="modalTitle"></h2>
    <div class="desc" id="modalDesc"></div>

    <div class="player">
      <div class="player-top" id="playerTitle"></div>

      <div class="player-controls">
        <button class="big-btn" onclick="togglePlay()">⏯</button>

        <div class="time" id="currentTime">0:00</div>

        <input type="range" id="progress" class="progress" value="0">

        <div class="time" id="duration">0:00</div>
      </div>
    </div>

  </div>
</div>

<audio id="audio"></audio>

<script>

let mode = "index";

const trollpicks = [
  { name:"Ajaxvlad", note:8, desc:"Description Ajax" },
  { name:"Mozzarellia", note:9, desc:"Description Mozza" },
  { name:"Yasugrosyonegro", note:7, desc:"Description Yasu" },
  { name:"Jeanluxmelanchon", note:8, desc:"Description Jeanlux" }
];

const audio = document.getElementById("audio");

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let data = [...trollpicks];

  if(mode==="note"){
    data.sort((a,b)=>b.note-a.note);
  }

  const sorted = [...trollpicks].sort((a,b)=>b.note-a.note);
  const top1 = sorted[0].note;
  const top2 = sorted.find(x=>x.note<top1)?.note;
  const top3 = sorted.find(x=>x.note<top2)?.note;

  data.forEach((t,i)=>{

    let border="transparent";
    if(t.note===top1) border="gold";
    else if(t.note===top2) border="silver";
    else if(t.note===top3) border="#cd7f32";

    const indexOriginal = trollpicks.indexOf(t)+1;

    const card=document.createElement("div");
    card.className="card";
    card.style.borderColor=border;

    card.innerHTML=`
      <div class="index">#${indexOriginal}</div>
      <img src="${t.name}.png">
      <div class="content">
        <div class="title">${t.name}</div>
        <div class="note">⭐ ${t.note}/10</div>
      </div>
    `;

    card.onclick=()=>openModal(t);

    grid.appendChild(card);
  });
}

function sortBy(type){
  mode = type;
  render();
}

function openModal(t){
  document.getElementById("modal").style.display="flex";

  document.getElementById("modalImg").src = t.name + ".png";
  document.getElementById("modalTitle").textContent = t.name;
  document.getElementById("modalDesc").textContent = t.desc;

  document.getElementById("playerTitle").textContent = t.name;

  audio.src = t.name + ".mp3";
  audio.play();
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

const progress = document.getElementById("progress");
const currentTime = document.getElementById("currentTime");
const duration = document.getElementById("duration");

audio.addEventListener("timeupdate", ()=>{
  progress.value = (audio.currentTime/audio.duration)*100 || 0;

  currentTime.textContent = format(audio.currentTime);
  duration.textContent = format(audio.duration);
});

progress.addEventListener("input", ()=>{
  audio.currentTime = (progress.value/100)*audio.duration;
});

function format(t){
  if(isNaN(t)) return "0:00";
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  if(s<10) s="0"+s;
  return m+":"+s;
}

// fermer modal
document.getElementById("modal").onclick = (e)=>{
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
    audio.pause();
  }
};

render();

</script>

</body>
</html>
